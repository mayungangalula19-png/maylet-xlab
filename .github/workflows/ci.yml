name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Circular dependency audit
        run: npm run audit:circular

      - name: Route inventory
        run: npm run audit:routes

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test
