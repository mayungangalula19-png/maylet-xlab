# Maylet XLab – Supabase local config
# https://supabase.com/docs/guides/cli/config

project_id = "maylet-xlab"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173/reset-password", "http://localhost:5173/verify-email"]

[storage]
enabled = true
file_size_limit = "50MiB"
